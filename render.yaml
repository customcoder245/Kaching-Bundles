services:
  - type: web
    name: kaching-bundles
    env: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    autoDeploy: true
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        fromConfigVar: MONGO_URI
      - key: SHOPIFY_API_KEY
        fromConfigVar: SHOPIFY_API_KEY
      - key: SHOPIFY_API_SECRET
        fromConfigVar: SHOPIFY_API_SECRET
      - key: SHOPIFY_SCOPES
        value: read_products,write_products,read_orders,write_discounts,read_script_tags,write_script_tags
      - key: HOST
        sync: false
